services:
  api:
    build: .
    container_name: rag_api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage

  worker:
    build: .
    container_name: rag_worker
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
    command: ["rq", "worker", "ingestion", "chat", "--url", "redis://redis:6379/0"]
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./storage:/app/storage

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
